<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Your OTP Code</title>
    <style>
      body { font-family: Arial, sans-serif; color: #333; line-height: 1.6; }
      .container { max-width: 600px; margin: 0 auto; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
      .header { background-color: #007bff; color: #fff; padding: 20px; text-align: center; }
      .content { padding: 30px; }
      .otp-box { font-size: 36px; font-weight: bold; letter-spacing: 12px; color: #007bff; text-align: center; background: #f0f7ff; padding: 20px; border-radius: 8px; margin: 20px 0; }
      .footer { background-color: #f1f1f1; padding: 10px; text-align: center; font-size: 12px; color: #777; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header"><h1>NaijaBus Verification</h1></div>
      <div class="content">
        <p>Dear {{ full_name }},</p>
        <p>Your one-time verification code is:</p>
        <div class="otp-box">{{ otp_code }}</div>
        <p>This code expires in <strong>10 minutes</strong>. Do not share it with anyone.</p>
        <p>If you did not request this, please ignore this email.</p>
      </div>
      <div class="footer"><p>&copy; 2026 NaijaBus. All rights reserved.</p></div>
    </div>
  </body>
</html>
